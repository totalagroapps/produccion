<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Sistema Producción</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:#0f172a;
color:white;
padding:14px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.logo{
font-size:18px;
font-weight:600;
letter-spacing:0.5px;
}

.menu a{
color:#e5e7eb;
margin-left:10px;
text-decoration:none;
padding:6px 14px;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

.menu a:hover{
background:#1f2937;
color:white;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
background:#111827;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.btn{
background:#10b981;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
}

.btn-red{
background:#ef4444;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🏭 Sistema Producción
</div>

<div class="menu">

<a href="/">Home</a>
<a href="/panel">Producción</a>
<a href="/operarios">Operarios</a>

</div>

</div>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
