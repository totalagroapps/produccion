<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800, initial-scale=1, user-scalable=no">
<title>Registro Produccion HMI</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #1f6feb;
    --accent-glow: rgba(31,111,235,0.25);
    --green: #2ea043;
    --green-glow: rgba(46,160,67,0.25);
    --red: #da3633;
    --red-glow: rgba(218,54,51,0.2);
    --amber: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 800px;
    height: 480px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 14px;
  }
  #topbar .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text);
  }
  #topbar .title span { color: var(--accent); }

  #estadoPill {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    transition: all .3s;
    letter-spacing: .4px;
  }
  #estadoPill.running  { background: rgba(46,160,67,.15); border-color: var(--green); color: #3fb950; }
  #estadoPill.saving   { background: rgba(31,111,235,.15); border-color: var(--accent); color: #58a6ff; }
  #estadoPill.saved    { background: rgba(46,160,67,.1); border-color: var(--green); color: #3fb950; }
  #estadoPill.error    { background: rgba(218,54,51,.15); border-color: var(--red); color: #f85149; }

  #clock {
    font-size: 13px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    text-align: right;
  }

  /* ── MAIN LAYOUT ── */
  #main {
    display: grid;
    grid-template-columns: 460px 1fr;
    height: 436px;
  }

  /* ── LEFT PANEL ── */
  #left {
    border-right: 1px solid var(--border);
    padding: 12px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field.wide { grid-column: 1 / -1; }

  .field label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  .field select, .field input {
    height: 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    padding: 0 10px;
    outline: none;
    width: 100%;
    cursor: pointer;
    transition: border-color .2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .field select:focus, .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field select:disabled, .field input:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* custom arrow for selects */
  .sel-wrap { position: relative; }
  .sel-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
    font-size: 14px;
  }

  /* ── BUTTONS ── */
  #actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 7px;
    margin-top: auto;
  }

  button {
    height: 48px;
    border: 0;
    border-radius: 8px;
    font-family: var(--font);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: transform .1s, opacity .2s, box-shadow .2s;
    letter-spacing: .3px;
  }
  button:active { transform: scale(.95); }
  button:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  #btnIniciar {
    grid-column: 1 / 3;
    background: var(--green);
    color: white;
    font-size: 15px;
    box-shadow: 0 2px 12px var(--green-glow);
  }
  #btnIniciar:not(:disabled):hover { box-shadow: 0 4px 18px var(--green-glow); }

  #btnGuardar {
    grid-column: 3 / 5;
    background: var(--accent);
    color: white;
    font-size: 15px;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  #btnGuardar:not(:disabled):hover { box-shadow: 0 4px 18px var(--accent-glow); }

  #btnCancelar {
    grid-column: 1 / 3;
    background: var(--surface2);
    border: 1px solid var(--red);
    color: #f85149;
  }

  #btnRecargar {
    grid-column: 3 / 5;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* ── MESSAGE BAR ── */
  #mensaje {
    display: none;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  #mensaje.ok    { display: block; background: rgba(46,160,67,.12); border: 1px solid rgba(46,160,67,.4); color: #3fb950; }
  #mensaje.error { display: block; background: rgba(218,54,51,.12); border: 1px solid rgba(218,54,51,.4); color: #f85149; }

  /* ── RIGHT PANEL ── */
  #right {
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
  }

  /* TIMER */
  #timerBox {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 10px 12px;
    gap: 4px;
    flex-shrink: 0;
  }
  #timerLabel { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 700; }
  #cronometro {
    font-size: 46px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
  }
  #cronometro.running { color: #3fb950; }

  /* SUMMARY */
  #summary {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow: hidden;
  }
  .sumrow {
    display: flex;
    flex-direction: column;
    padding: 8px 0;
    border-bottom: 1px solid var(--surface2);
    gap: 2px;
    min-width: 0;
  }
  .sumrow strong { font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); font-weight: 700; }
  .sumrow span { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── MODAL ── */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(1,4,9,.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal.visible { display: flex; }
  #modalBox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 26px 22px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
  }
  #modalBox h2 { font-size: 18px; margin-bottom: 6px; }
  #modalBox p { color: var(--text2); font-size: 12px; margin-bottom: 16px; }
  #modalCantidadInput {
    width: 100%;
    height: 60px;
    background: var(--surface2);
    border: 2px solid var(--accent);
    border-radius: 8px;
    color: var(--text);
    font-size: 34px;
    font-weight: 800;
    text-align: center;
    outline: none;
    font-family: var(--font);
    margin-bottom: 16px;
  }
  #modalBox .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  #modalBox .modal-btns button { height: 44px; font-size: 14px; }
  .btn-modal-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .btn-modal-ok { background: var(--accent); color: white; }

  /* loading spinner */
  #loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(1,4,9,.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  #loadingOverlay.visible { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingOverlay span { color: var(--text2); font-size: 13px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="title">⚙ Registro <span>Producción</span></div>
  <div id="estadoPill">Listo</div>
  <div id="clock">--:--:--</div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT -->
  <div id="left">

    <div class="field wide">
      <label>Operario</label>
      <div class="sel-wrap">
        <select id="operarioSelect" disabled>
          <option value="{{ operario_actual.id }}">{{ operario_actual.nombre }}</option>
        </select>
      </div>
    </div>

    <div class="field wide">
      <label>Orden abierta</label>
      <div class="sel-wrap">
        <select id="ordenSelect"><option value="">Cargando...</option></select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Proceso</label>
        <div class="sel-wrap">
          <select id="procesoSelect" disabled><option value="">— primero orden —</option></select>
        </div>
      </div>
      <div class="field">
        <label>Actividad</label>
        <div class="sel-wrap">
          <select id="actividadSelect" disabled><option value="">— primero proceso —</option></select>
        </div>
      </div>
    </div>

    <div class="field wide">
      <label>Inicio del registro</label>
      <input id="inicioInput" type="text" disabled placeholder="Pendiente de iniciar...">
    </div>

    <div id="mensaje"></div>

    <div id="actions">
      <button id="btnIniciar"  onclick="iniciarRegistro()">▶ Iniciar</button>
      <button id="btnGuardar"  onclick="guardarRegistro()" disabled>💾 Guardar</button>
      <button id="btnCancelar" onclick="cancelarRegistro()" disabled>✕ Cancelar</button>
      <button id="btnRecargar" onclick="recargarDatos()">↺ Recargar</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div id="right">

    <div id="timerBox">
      <div id="timerLabel">Tiempo transcurrido</div>
      <div id="cronometro">00:00:00</div>
    </div>

    <div id="summary">
      <div class="sumrow">
        <strong>Orden</strong>
        <span id="resOrden">Sin seleccionar</span>
      </div>
      <div class="sumrow">
        <strong>Actividad</strong>
        <span id="resActividad">Sin seleccionar</span>
      </div>
      <div class="sumrow">
        <strong>Operario</strong>
        <span id="resOperario">Sin seleccionar</span>
      </div>
    </div>

  </div>
</div>

<!-- MODAL CANTIDAD -->
<div id="modal" role="dialog" aria-modal="true">
  <div id="modalBox">
    <h2>¿Cuántas unidades?</h2>
    <p>Ingresa la cantidad producida (puede ser 0 para pausa o interrupción).</p>
    <input id="modalCantidadInput" type="number" min="0" step="1" placeholder="0" inputmode="numeric">
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-modal-ok"     onclick="confirmarCantidad()">Confirmar</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingText">Cargando datos...</span>
</div>

<script>
const operarioSesion = {{ operario_actual | tojson }};
let operarios = [operarioSesion];
let maquinas = [], ordenes = [], procesos = [], actividades = [];
let inicioRegistro = null, timerId = null, bloqueado = false;

// ── CLOCK ──
function tickClock(){
  const n = new Date();
  document.getElementById('clock').textContent =
    pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
}
setInterval(tickClock, 1000);
tickClock();

// ── HELPERS ──
function pad(n){ return String(n).padStart(2,'0'); }
function formatoLocal(f){
  return f.getFullYear()+'-'+pad(f.getMonth()+1)+'-'+pad(f.getDate())+' '+
         pad(f.getHours())+':'+pad(f.getMinutes())+':'+pad(f.getSeconds());
}
function formatoCrono(s){
  return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60);
}

function setEstado(txt, cls){
  const p = document.getElementById('estadoPill');
  p.textContent = txt;
  p.className = cls || '';
}
function mostrarMensaje(txt, tipo){
  const b = document.getElementById('mensaje');
  b.textContent = txt;
  b.className = tipo || '';
}
function loading(visible, txt){
  document.getElementById('loadingText').textContent = txt || 'Cargando...';
  document.getElementById('loadingOverlay').classList.toggle('visible', visible);
}

// ── NORMALIZE ──
function normMaq(i)  { return Array.isArray(i)?{id:i[0],nombre:i[1]}:i; }
function normOrden(i){
  if(!Array.isArray(i)) return i;
  const maq = maquinas.find(m=>String(m.id)===String(i[1]));
  return {id:i[0],maquina_id:i[1],estado:i[2],porcentaje:i[3],
          producto:maq?maq.nombre:'Máquina '+i[1],cantidad:''};
}
function normBasic(i){ return Array.isArray(i)?{id:i[0],nombre:i[1]}:i; }

function llenarSelect(sel, datos, ph, labelFn){
  sel.innerHTML='';
  const o=document.createElement('option'); o.value=''; o.textContent=ph; sel.appendChild(o);
  datos.forEach(item=>{
    const opt=document.createElement('option');
    opt.value=item.id;
    opt.textContent=labelFn?labelFn(item):item.nombre;
    sel.appendChild(opt);
  });
}

async function cargarJson(url){
  const r = await fetch(url);
  const txt = await r.text();
  let data; try{ data=JSON.parse(txt); }catch(_){ data={detail:txt}; }
  if(!r.ok) throw new Error(data.detail||'Error '+url);
  return data;
}

// ── LOAD DATA ──
async function recargarDatos(){
  try{
    loading(true,'Cargando datos...');
    maquinas = (await cargarJson('/maquinas')).map(normMaq);
    ordenes  = (await cargarJson('/ordenes')).map(normOrden);
    llenarSelect(document.getElementById('operarioSelect'), operarios, '—');
    document.getElementById('operarioSelect').value = operarioSesion.id||'';
    llenarSelect(
      document.getElementById('ordenSelect'),
      ordenes,
      ordenes.length?'Seleccione orden':'Sin órdenes abiertas',
      o=>'Orden '+o.id+' — '+(o.producto||'Máq. '+o.maquina_id)
    );
    limpiarPA();
    setEstado('Listo','');
    actualizarResumen();
    mostrarMensaje('','');
  }catch(e){
    setEstado('Error datos','error');
    mostrarMensaje(e.message,'error');
  }finally{ loading(false); }
}

function limpiarPA(){
  procesos=[]; actividades=[];
  llenarSelect(document.getElementById('procesoSelect'),  [],'— seleccione orden —');
  llenarSelect(document.getElementById('actividadSelect'),[],'— seleccione proceso —');
  document.getElementById('procesoSelect').disabled=true;
  document.getElementById('actividadSelect').disabled=true;
}

async function cargarProcesos(){
  const oid = document.getElementById('ordenSelect').value;
  llenarSelect(document.getElementById('actividadSelect'),[],'— seleccione proceso —');
  document.getElementById('actividadSelect').disabled=true;
  if(!oid){ limpiarPA(); actualizarResumen(); return; }
  try{
    procesos=(await cargarJson('/procesos/'+oid)).map(normBasic);
    llenarSelect(document.getElementById('procesoSelect'),procesos,
      procesos.length?'Seleccione proceso':'Sin procesos');
    document.getElementById('procesoSelect').disabled=procesos.length===0||bloqueado;
    actualizarResumen();
  }catch(e){ mostrarMensaje(e.message,'error'); }
}

async function cargarActividades(){
  const oid=document.getElementById('ordenSelect').value;
  const pid=document.getElementById('procesoSelect').value;
  if(!oid||!pid){
    llenarSelect(document.getElementById('actividadSelect'),[],'— seleccione proceso —');
    document.getElementById('actividadSelect').disabled=true;
    actualizarResumen(); return;
  }
  try{
    actividades=(await cargarJson('/actividades/'+oid+'/'+pid)).map(normBasic);
    llenarSelect(document.getElementById('actividadSelect'),actividades,
      actividades.length?'Seleccione actividad':'Sin actividades');
    document.getElementById('actividadSelect').disabled=actividades.length===0||bloqueado;
    actualizarResumen();
  }catch(e){ mostrarMensaje(e.message,'error'); }
}

function selActual(){
  return {
    operario: operarios.find(x=>String(x.id)===document.getElementById('operarioSelect').value),
    orden:    ordenes.find(x=>String(x.id)===document.getElementById('ordenSelect').value),
    proceso:  procesos.find(x=>String(x.id)===document.getElementById('procesoSelect').value),
    actividad:actividades.find(x=>String(x.id)===document.getElementById('actividadSelect').value)
  };
}
function actualizarResumen(){
  const s=selActual();
  document.getElementById('resOperario').textContent = s.operario?s.operario.nombre:'Sin seleccionar';
  document.getElementById('resOrden').textContent    = s.orden?'Orden '+s.orden.id+' — '+(s.orden.producto||''):'Sin seleccionar';
  document.getElementById('resActividad').textContent= s.actividad?s.actividad.nombre:'Sin seleccionar';
}
function validar(){
  const s=selActual();
  if(!s.operario)  return 'Seleccione un operario.';
  if(!s.orden)     return 'Seleccione una orden.';
  if(!s.proceso)   return 'Seleccione un proceso.';
  if(!s.actividad) return 'Seleccione una actividad.';
  return '';
}
function setBloqueo(v){
  bloqueado=v;
  ['operarioSelect','ordenSelect','procesoSelect','actividadSelect'].forEach(id=>{
    const el=document.getElementById(id);
    el.disabled = id==='operarioSelect'||v||(id==='procesoSelect'&&procesos.length===0)||(id==='actividadSelect'&&actividades.length===0);
  });
}

// ── REGISTRO ──
function iniciarRegistro(){
  const err=validar(); if(err){ mostrarMensaje(err,'error'); return; }
  inicioRegistro=new Date();
  document.getElementById('inicioInput').value=formatoLocal(inicioRegistro);
  document.getElementById('cronometro').classList.add('running');
  timerId=setInterval(()=>{
    const s=Math.max(0,Math.floor((new Date()-inicioRegistro)/1000));
    document.getElementById('cronometro').textContent=formatoCrono(s);
  },1000);
  setBloqueo(true);
  document.getElementById('btnIniciar').disabled=true;
  document.getElementById('btnGuardar').disabled=false;
  document.getElementById('btnCancelar').disabled=false;
  setEstado('En curso','running');
  mostrarMensaje('Operación iniciada.','ok');
}

function cancelarRegistro(){
  clearInterval(timerId); timerId=null; inicioRegistro=null;
  document.getElementById('inicioInput').value='';
  document.getElementById('cronometro').textContent='00:00:00';
  document.getElementById('cronometro').classList.remove('running');
  setBloqueo(false);
  document.getElementById('btnIniciar').disabled=false;
  document.getElementById('btnGuardar').disabled=true;
  document.getElementById('btnCancelar').disabled=true;
  setEstado('Listo','');
  mostrarMensaje('Registro cancelado.','error');
}

function guardarRegistro(){
  if(!inicioRegistro){ mostrarMensaje('Debe iniciar el registro primero.','error'); return; }
  document.getElementById('modalCantidadInput').value='';
  document.getElementById('modal').classList.add('visible');
  setTimeout(()=>document.getElementById('modalCantidadInput').focus(),60);
}

function cerrarModal(){
  document.getElementById('modal').classList.remove('visible');
}

async function confirmarCantidad(){
  const txt=document.getElementById('modalCantidadInput').value.trim();
  if(txt==='') return;
  const cant=Number(txt);
  if(!Number.isFinite(cant)||cant<0||!Number.isInteger(cant)){
    alert('Ingrese un número entero mayor o igual a 0.');
    return;
  }
  cerrarModal();
  const s=selActual(), fin=new Date();
  const payload={
    orden_id:s.orden.id, actividad_id:s.actividad.id, cantidad:cant,
    inicio:formatoLocal(inicioRegistro), fin:formatoLocal(fin),
    tiempo:Math.max(0,Math.floor((fin-inicioRegistro)/1000))
  };
  try{
    loading(true,'Guardando registro...');
    setEstado('Guardando...','saving');
    document.getElementById('btnGuardar').disabled=true;
    const r=await fetch('/registro_web/registro',{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    const txt2=await r.text();
    let data; try{ data=JSON.parse(txt2); }catch(_){ data={detail:txt2}; }
    if(!r.ok){ document.getElementById('btnGuardar').disabled=false; throw new Error(data.detail||'Error al guardar.'); }
    clearInterval(timerId); timerId=null; inicioRegistro=null;
    document.getElementById('cronometro').textContent='00:00:00';
    document.getElementById('cronometro').classList.remove('running');
    document.getElementById('inicioInput').value='';
    setBloqueo(false);
    document.getElementById('btnIniciar').disabled=false;
    document.getElementById('btnGuardar').disabled=true;
    document.getElementById('btnCancelar').disabled=true;
    await recargarDatos();
    setEstado('Guardado ✓','saved');
    mostrarMensaje('Registro guardado correctamente.','ok');
  }catch(e){
    document.getElementById('btnGuardar').disabled=false;
    setEstado('Error al guardar','error');
    mostrarMensaje(e.message,'error');
  }finally{ loading(false); }
}

document.getElementById('modalCantidadInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmarCantidad();
  if(e.key==='Escape') cerrarModal();
});
document.getElementById('ordenSelect').addEventListener('change', cargarProcesos);
document.getElementById('procesoSelect').addEventListener('change', cargarActividades);
document.getElementById('operarioSelect').addEventListener('change', actualizarResumen);
document.getElementById('actividadSelect').addEventListener('change', actualizarResumen);

recargarDatos();
</script>
