<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Editar Producto</title>
<style>


body{
    font-family:Arial;
    background:#f1f5f9;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    max-width:500px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:600;
}
</style>
</head>

<div style="margin-bottom:20px;">
    <a href="/inventario"
       style="background:#1e293b;color:white;padding:8px 16px;
              border-radius:8px;text-decoration:none;font-weight:600;">
        ⬅ Volver a Inventario
    </a>
</div>


<body>

<div class="card">
<h2>Editar Producto</h2>

<form method="post" action="/inventario/editar">

    <label>Referencia</label>
    <input type="text" name="referencia" value="{{ producto.referencia }}" readonly>

    <label>Peso unitario (gr)</label>
    <input type="number" step="0.01" name="peso" value="{{ producto.peso }}">

    <label>Precio unitario</label>
    <input type="number" step="0.01" name="precio" value="{{ producto.precio }}">

    <button type="submit">Guardar Cambios</button>

</form>

<form method="post" action="/inventario/eliminar"
      onsubmit="return confirm('¿Seguro que deseas eliminar este producto?')"
      style="margin-top:20px;">

    <input type="hidden" name="referencia" value="{{ producto.referencia }}">

    <button type="submit"
        style="background:#dc2626;color:white;
               padding:8px 16px;border:none;border-radius:8px;font-weight:600;">
        🗑 Eliminar Producto
    </button>
</form>

</div>

</body>
</html>
