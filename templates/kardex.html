<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kardex {{ referencia }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
    padding:40px;
}

h2{
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

th, td{
    padding:12px;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
}

tr:nth-child(even){
    background:#f8fafc;
}

.ingreso{
    color:#16a34a;
    font-weight:600;
}

.salida{
    color:#dc2626;
    font-weight:600;
}
</style>
</head>

<body>

<h2>📋 Kardex - {{ referencia }}</h2>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Cantidad</th>
<th>Usuario</th>
<th>Saldo</th>
</tr>
</thead>

<tbody>
{% for mov in kardex %}
<tr>
<td>{{ mov.fecha }}</td>
<td class="{% if mov.tipo == 'INGRESO' %}ingreso{% else %}salida{% endif %}">
    {{ mov.tipo }}
</td>
<td>{{ mov.cantidad }}</td>
<td>{{ mov.usuario }}</td>
<td>{{ mov.saldo }}</td>
</tr>
{% endfor %}
</tbody>
</table>

<br>
<a href="/inventario">⬅ Volver</a>

</body>
</html>
