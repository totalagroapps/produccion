<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<title>Cambiar password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}
body{
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.login-container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:370px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    text-align:center;
}
.login-container img{
    height:60px;
    margin-bottom:20px;
}
.login-container h2{
    margin-bottom:8px;
}
.login-container p{
    color:#64748b;
    font-size:14px;
    margin-bottom:24px;
}
.form-group{
    text-align:left;
    margin-bottom:18px;
}
.form-group label{
    font-size:14px;
    color:#64748b;
}
.form-group input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    margin-top:5px;
    font-size:14px;
}
.form-group input:focus{
    outline:none;
    border:1px solid #16a34a;
}
.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#16a34a,#15803d);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
.login-btn:hover{
    transform:scale(1.03);
}
.error{
    background:#fee2e2;
    border:1px solid #fca5a5;
    color:#991b1b;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    margin-bottom:18px;
    padding:10px 12px;
    text-align:left;
}
</style>

<style>
/* Base Responsive Styles */
@media (max-width: 768px) {
    .container {
        padding: 15px !important;
    }
    .card, .box, .panel {
        padding: 12px !important;
        margin-bottom: 15px !important;
    }
    .grid {
        grid-template-columns: 1fr !important;
    }
    input, select, button, textarea {
        width: 100% !important;
        box-sizing: border-box !important;
        margin-bottom: 8px !important;
    }
    table {
        display: block !important;
        width: 100% !important;
        overflow-x: auto !important;
        white-space: nowrap !important;
    }
    th, td {
        padding: 8px !important;
        font-size: 13px !important;
    }
    h2, h3 {
        font-size: 1.2rem !important;
    }
}
</style>

</head>
<body>

<div class="login-container">
    <img src="/static/logo.png" alt="Logo">

    <h2>Cambiar password</h2>
    <p>Antes de registrar produccion debes crear tu password personal.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/cambiar_password">
        <div class="form-group">
            <label>Nuevo password</label>
            <input type="password" name="nueva_password" placeholder="Nuevo password" required minlength="4">
        </div>

        <div class="form-group">
            <label>Confirmar password</label>
            <input type="password" name="confirmar_password" placeholder="Confirmar password" required minlength="4">
        </div>

        <button type="submit" class="login-btn">Guardar password</button>
    </form>
</div>

</body>
</html>
