<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KPI Producción</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f2f4f7;margin:0}
.container{padding:40px}
.card{background:white;padding:25px;margin-bottom:30px;border-radius:10px}
canvas{max-height:350px}
a{text-decoration:none}
</style>

</head>
<body>
{% include '_navbar.html' %}

<div class="container">

<h2>📊 Dashboard KPI</h2>

<a href="/">⬅ Volver al menú</a>

<div class="card">
<h3>Piezas por Operario</h3>
<canvas id="op"></canvas>
</div>

<div class="card">
<h3>Minutos trabajados</h3>
<canvas id="min"></canvas>
</div>

<div class="card">
<h3>Producción diaria</h3>
<canvas id="dia"></canvas>
</div>

</div>

<script>

const op_labels = {{ por_operario | map(attribute=0) | list | safe }};
const op_data   = {{ por_operario | map(attribute=1) | list | safe }};

new Chart(document.getElementById("op"),{
    type:"bar",
    data:{labels:op_labels,datasets:[{label:"Piezas",data:op_data}]}
});

const min_labels = {{ minutos | map(attribute=0) | list | safe }};
const min_data   = {{ minutos | map(attribute=1) | list | safe }};

new Chart(document.getElementById("min"),{
    type:"bar",
    data:{labels:min_labels,datasets:[{label:"Minutos",data:min_data}]}
});

const d_labels = {{ diario | map(attribute=0) | list | safe }};
const d_data   = {{ diario | map(attribute=1) | list | safe }};

new Chart(document.getElementById("dia"),{
    type:"line",
    data:{labels:d_labels,datasets:[{label:"Producción",data:d_data}]}
});

</script>

</body>
</html>
